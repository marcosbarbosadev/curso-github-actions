name: Curso de github actions

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  primeiro-job:
    name: "Meu primeiro Job"
    runs-on: ubuntu-latest

    steps:
      - name: "Minha primeira ação"
        run: echo Hello, world!

      - name: "Segunda ação"
        run: |
          echo "Você criou seu primeiro job :)!"
          echo Parabéns!
      - name: "Script python"
        run: |
          variavel = "Hello Python"
          print(variavel)
        shell: python
  segundo-job:
    name: "Instalação do NodeJS"
    runs-on: ubuntu-latest
    steps:
      - name: "Verificação da versão atual do NodeJS"
        run: node --version
